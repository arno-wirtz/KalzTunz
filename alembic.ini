# Alembic configuration for KalzTunz
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated filenames
timezone = UTC

# Max length of slug in filename
truncate_slug_length = 40

# Set to 'true' to run the environment during `alembic init`
prepend_sys_path = .

# Version locations
version_path_separator = os

# Database URL — reads from environment variable set by Docker / .env
sqlalchemy.url = %(DATABASE_URL)s


[post_write_hooks]
# Uncomment to auto-format migration files with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 120


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
