# KalzTunz — Render.com deployment configuration
# https://render.com/docs/yaml-spec

services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: kalztunz-api
    runtime: python
    region: ohio
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install --only-binary=scipy -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: kalztunz-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: kalztunz-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://kalztunz.onrender.com
      - key: CORS_ORIGINS
        value: https://kalztunz.onrender.com
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,kalztunz.onrender.com,kalztunz-api.onrender.com,*.onrender.com
      - key: ENVIRONMENT
        value: production

  # ── Frontend (static site) ───────────────────────────────
  - type: web
    name: kalztunz
    runtime: static
    region: ohio
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://kalztunz-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html

  # ── RQ Worker ─────────────────────────────────────────────
  - type: worker
    name: kalztunz-worker
    runtime: python
    region: ohio
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install --only-binary=scipy -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: REDIS_URL
        fromService:
          name: kalztunz-redis
          type: redis
          property: connectionString

databases:
  - name: kalztunz-db
    region: ohio
    plan: free
    databaseName: kalztunz
    user: kalztunz_user
